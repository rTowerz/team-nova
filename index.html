<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="script.js">

</head>
<body>
    <div class="container">
        <h1>What you want to study?</h1>
        <p>Enter a topic you want to study, it can be anything!</p>

        <div class="input-inner">
            <input type="text" placeholder="Enter a topic you want to learn"/>
            <button class="Send">Generate✦</button>
        </div>

        <div class="recommendations">
            <h2>Recommended Topics</h2>
            <div class="topic-buttons">
                <button class="topic-btn" data-topic="Python Programming">Python Programming</button>
                <button class="topic-btn" data-topic="JavaScript Basics">JavaScript Basics</button>
                <button class="topic-btn" data-topic="Machine Learning">Machine Learning</button>
                <button class="topic-btn" data-topic="Web Development">Web Development</button>
                <button class="topic-btn" data-topic="Data Structures">Data Structures</button>
                <button class="topic-btn" data-topic="Algorithms">Algorithms</button>
            </div>
        </div>
    </div>

    <div id="flashcards" class="flashcards hidden"></div>

    <script src="script.js"></script>
</body>
</html>
